<!DOCTYPE html>

<html class="light" lang="zh-TW"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0ea5e9", // Sky blue for the theme
                        "background-light": "#f0f9ff", // Very light blue sky
                        "background-dark": "#0c4a6e",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .sky-gradient {
            background: linear-gradient(180deg, #e0f2fe 0%, #ffffff 100%);
        }
        .concentric-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 40px;
            height: 40px;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
        }
        .circle-1 { width: 100%; height: 100%; background-color: #EF4444; z-index: 1; }
        .circle-2 { width: 66.67%; height: 66.67%; background-color: #FBBF24; z-index: 2; }
        .circle-3 { width: 33.33%; height: 33.33%; background-color: #22C55E; z-index: 3; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex min-h-screen w-full flex-col sky-gradient overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-4 bg-white/80 backdrop-blur-md sticky top-0 z-10 border-b border-primary/10">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-slate-800">編輯個人資料</h1>
<div class="concentric-logo">
<div class="circle circle-1"></div>
<div class="circle circle-2"></div>
<div class="circle circle-3"></div>
</div>
</header>
<main class="flex-1 max-w-md mx-auto w-full px-4 py-6 space-y-8">
<!-- Profile Picture Section -->
<div class="flex flex-col items-center gap-4">
<div class="relative group">
<div class="size-32 rounded-full bg-white p-1 shadow-xl border border-primary/20 overflow-hidden">
<img alt="User avatar" class="w-full h-full object-cover rounded-full" data-alt="Calm portrait of a student for profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATEH2UrMZ_npmyIyW2Ut1ayB3kMFtc6zO4G6ZIsIhTogehhQLEN_8j9fgZrGQceDh9aqhr_3gd3XH4V73Bl5wvftx_aN1hEa5vNjNuh-_nVhN3LdX5ut3OhHMqSol0Dfyr6hdAs3VvM4FOhJJUVNFlP1BOx_oodxeYdB1ZXKZJyPbsa-ja834BFgvbZgj53QWNi43MSMOmuDfOCrKEdvRH2_7N91g-N3FB6QGfuZShbwjA4EG5-9eEX5HggZgvLaa13klDLtJKEiw"/>
</div>
<button class="absolute bottom-0 right-0 size-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white hover:bg-primary/90 transition-transform active:scale-95">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div class="text-center">
<p class="text-primary font-semibold">淡江大學禪學社</p>
<p class="text-slate-500 text-sm">TKU Zen Club Member</p>
</div>
</div>
<!-- Form Section -->
<div class="bg-white/60 backdrop-blur-sm p-6 rounded-3xl shadow-soft space-y-5 border border-white">
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1">姓名</label>
<input class="w-full h-12 px-4 rounded-2xl border-none bg-white/80 focus:ring-2 focus:ring-primary/50 shadow-sm placeholder:text-slate-400" placeholder="請輸入姓名" type="text" value="李大同"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1">學號</label>
<input class="w-full h-12 px-4 rounded-2xl border-none bg-white/80 focus:ring-2 focus:ring-primary/50 shadow-sm placeholder:text-slate-400" placeholder="請輸入學號" type="text" value="410220123"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1">系級</label>
<input class="w-full h-12 px-4 rounded-2xl border-none bg-white/80 focus:ring-2 focus:ring-primary/50 shadow-sm placeholder:text-slate-400" placeholder="例如：資工系三年級" type="text" value="中文系二年級"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 ml-1">個人簡介</label>
<textarea class="w-full p-4 rounded-2xl border-none bg-white/80 focus:ring-2 focus:ring-primary/50 shadow-sm placeholder:text-slate-400 resize-none" placeholder="分享你的習禪心得..." rows="3">靜中養成，動中磨練。在淡江禪學社找到心靈的平靜。</textarea>
</div>
</div>
<!-- Save Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-white font-bold rounded-2xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                    保存修改
                </button>
</div>
<div class="h-10"></div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-primary/10 px-6 py-2 pb-6 flex justify-between items-center z-20">
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">首頁</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium">帳本</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">calendar_month</span>
<span class="text-[10px] font-medium">行事曆</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined !fill-1">person</span>
<span class="text-[10px] font-bold">個人</span>
</a>
</nav>
</div>
</body></html>
